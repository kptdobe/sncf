name: Collect train delays

on:
  schedule:
    # 08:00 UTC ≈ 10:00 Paris (summer CEST) — after the last morning train completes.
    - cron: '0 8 * * 1-5'
    # 18:00 UTC ≈ 20:00 Paris (summer CEST) — after the last evening train completes.
    - cron: '0 18 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Collect observations (last 2 days)
        id: collect
        continue-on-error: true
        env:
          SNCF_API_TOKEN: ${{ secrets.SNCF_API_TOKEN }}
        run: node src/collect.js -x -b 2

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: train delays $(date -u +%Y-%m-%d)"
            git push
          fi
