name: Collect train delays

on:
  schedule:
    # 18:00 UTC ≈ 20:00 Paris (summer) / 19:00 (winter), Monday–Friday.
    # Runs after the evening train so both that day's trains are still in the
    # SNCF realtime window (which only retains realized delays ~2 days).
    - cron: '0 18 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Collect today's observations
        env:
          SNCF_API_TOKEN: ${{ secrets.SNCF_API_TOKEN }}
        run: node src/collect.js -x

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: train delays $(date -u +%Y-%m-%d)"
            git push
          fi
